<style>

<div class="page">
  <h1>Things That Made Me Laugh</h1>
  <p>Language tricks, absurd observations, and the kind of joy that sneaks up on you sideways.</p>

  <div class="checker">
    <label>Palindrome Checker</label>
    <input type="text" id="inp" placeholder="type a word..." autocomplete="off" spellcheck="false">
    <div class="reversed" id="rev"></div>
    <div class="result" id="res"></div>
  </div>

  <div class="divider"></div>

  <div class="section-label">Entries</div>
  <a href="palindrome_13-03-2026.html" class="writing-item">
    <span class="wi-title">Palindromes — a mirror hiding in language</span>
    <span class="wi-date">13 Mar 2026</span>
  </a>
</div>

<footer><span>&copy; 2026 Anne Kinigadner-Walch</span><a href="https://github.com/annek77" target="_blank" rel="noopener">GitHub</a></footer>

<script>
const i=document.getElementById('inp'),r=document.getElementById('res'),v=document.getElementById('rev');
i.addEventListener('input',()=>{const t=i.value,c=t.replace(/[^a-zA-Z]/g,'').toLowerCase(),b=t.split('').reverse().join('');v.textContent=t?b:'';if(c.length<2){r.textContent='';r.className='result';return}const p=c===c.split('').reverse().join('');r.textContent=p?'Yes \u2014 palindrome.':'Not a palindrome.';r.className='result '+(p?'result-yes':'result-no')});
</script>
