<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Things That Made Me Think Today</title>
<style>
  :root {
    --bg: #1a1a1a;
    --bg-card: #222;
    --border: #333;
    --text: #e8e0d4;
    --text-muted: #999;
    --gold: #C4A265;
    --ochre: #8B6832;
    --umber: #2E1E0A;
    --font-body: Georgia, 'Times New Roman', serif;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    max-width: 720px;
    margin: 0 auto;
    padding: 80px 24px 60px;
    animation: fadeUp 0.8s ease-out;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .back {
    font-size: 0.82rem;
    color: var(--text-muted);
    text-decoration: none;
    letter-spacing: 0.06em;
    transition: color 0.2s;
    display: inline-block;
    margin-bottom: 48px;
  }
  .back:hover { color: var(--gold); }
  .back::before { content: '\2190\00a0\00a0'; }

  h1 {
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 400;
    color: var(--gold);
    margin-bottom: 12px;
    letter-spacing: 0.02em;
  }

  .subtitle {
    font-size: 1rem;
    color: var(--text-muted);
    font-style: italic;
    margin-bottom: 48px;
  }

  .divider {
    width: 60px;
    height: 1px;
    background: var(--ochre);
    border: none;
    margin-bottom: 48px;
  }

  /* ── Entry List ── */
  .entries {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .entry-link {
    display: block;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px 28px;
    text-decoration: none;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .entry-link:hover {
    border-color: var(--gold);
    transform: translateX(4px);
  }

  .entry-link::after {
    content: '\2192';
    position: absolute;
    right: 24px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gold);
    font-size: 1.2rem;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .entry-link:hover::after { opacity: 1; }

  .entry-date {
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ochre);
    margin-bottom: 4px;
  }

  .entry-title {
    font-size: 1.05rem;
    color: var(--gold);
  }

  .entry-teaser {
    font-size: 0.88rem;
    color: var(--text-muted);
    margin-top: 4px;
  }

  footer {
    margin-top: 64px;
    padding-top: 32px;
    border-top: 1px solid var(--border);
    font-size: 0.8rem;
    color: var(--text-muted);
  }
  footer a {
    color: var(--gold);
    text-decoration: none;
  }
  footer a:hover { color: var(--text); }

  @media (max-width: 560px) {
    .page { padding: 48px 18px 40px; }
    .entry-link { padding: 20px; }
  }
</style>
</head>
<body>
<main class="page">

  <a href="../" class="back">Home</a>

  <h1>Things That Made Me Think Today</h1>
  <p class="subtitle">A collection of small wonders, patterns, and rabbit holes.</p>
  <hr class="divider">

  <div class="entries">

    <a href="palindrome_13-03-2026.html" class="entry-link">
      <div class="entry-date">13 March 2026</div>
      <div class="entry-title">Palindromes</div>
      <div class="entry-teaser">Words and sentences that read the same backwards. A mirror in language.</div>
    </a>

    <!-- Future entries go here:
    <a href="filename.html" class="entry-link">
      <div class="entry-date">DD Month YYYY</div>
      <div class="entry-title">Title</div>
      <div class="entry-teaser">Short teaser text.</div>
    </a>
    -->

  </div>

  <footer>
    &copy; 2026 Anne Kinigadner-Walch &middot;
    <a href="../">Back to main site</a>
  </footer>

</main>
</body>
</html>
